<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1b3a6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="شئون العاملين">
<link rel="manifest" id="pwa-manifest">
<title>منظومة شئون العاملين</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script id="saved-data" type="application/json">null</script>
<style>
/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;font-family:'Cairo',sans-serif;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:#eef2f7;direction:rtl;font-size:14px}

/* ═══════════════════════════════════════════
   CSS VARIABLES
═══════════════════════════════════════════ */
:root{
  --navy:#1b3a6b;--navy-l:#2455a0;--navy-xl:#3b6eb5;
  --gold:#c8a84b;--gold-l:#f0d98a;
  --green:#16a34a;--green-l:#dcfce7;
  --red:#dc2626;--red-l:#fee2e2;
  --blue:#2563eb;--blue-l:#dbeafe;
  --purple:#7c3aed;--purple-l:#f3e8ff;
  --amber:#f59e0b;--amber-l:#fef9c3;
  --border:#dde3ec;--border-l:#eef2f7;
  --muted:#64748b;--muted-l:#94a3b8;
  --text:#1e293b;--text-l:#475569;
  --surf:#ffffff;--bg:#eef2f7;
  --radius:12px;--radius-lg:18px;--radius-xl:24px;
  --shadow:0 2px 8px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.14);
  --transition:.18s cubic-bezier(.4,0,.2,1);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --header-h:56px;
  --bottom-nav-h:64px;
}

/* ═══════════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════════ */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#info-bar{background:linear-gradient(135deg,var(--navy),var(--navy-l));color:#fff;padding:5px 16px;font-size:11px;font-weight:600;display:none;align-items:center;gap:10px;flex-wrap:wrap;line-height:1.8;flex-shrink:0}
#info-bar strong{opacity:1}#info-bar .ib-sep{opacity:.4}
#header{background:var(--surf);border-bottom:1px solid var(--border);height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 14px;gap:8px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.06);z-index:40;position:relative}
#content-area{display:flex;flex:1;overflow:hidden;min-height:0}
#sidebar{width:210px;min-width:210px;background:var(--surf);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;transition:transform var(--transition);z-index:30}
#main-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
#main{padding:16px;min-height:100%;max-width:1200px;margin:0 auto}
#sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:29;backdrop-filter:blur(2px)}

/* ═══════════════════════════════════════════
   BOTTOM NAV (Mobile)
═══════════════════════════════════════════ */
#bottom-nav{display:none;background:var(--surf);border-top:1px solid var(--border);height:var(--bottom-nav-h);padding-bottom:var(--safe-bottom);flex-shrink:0;box-shadow:0 -2px 12px rgba(0,0,0,.08);z-index:38}
.bn-inner{display:flex;height:100%;align-items:stretch}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;padding:6px 2px;transition:all var(--transition);color:var(--muted-l);position:relative}
.bn-btn.active{color:var(--navy)}
.bn-btn.active svg{stroke:var(--navy)}
.bn-btn svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.8;fill:none;transition:stroke var(--transition)}
.bn-btn .bn-label{font-size:10px;font-weight:700;line-height:1}
.bn-btn.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:3px;background:var(--navy);border-radius:0 0 3px 3px}
.bn-more-menu{position:fixed;bottom:calc(var(--bottom-nav-h) + var(--safe-bottom) + 8px);right:8px;background:var(--surf);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:8px;z-index:200;min-width:200px;display:none}
.bn-more-item{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;border:none;background:transparent;cursor:pointer;border-radius:var(--radius);color:var(--text);font-family:Cairo;font-weight:600;font-size:13px;text-align:right;transition:background var(--transition)}
.bn-more-item:hover,.bn-more-item:active{background:var(--border-l)}
.bn-more-item svg{width:18px;height:18px;stroke:var(--muted);stroke-width:2;fill:none;flex-shrink:0}

/* ═══════════════════════════════════════════
   SIDEBAR DESKTOP
═══════════════════════════════════════════ */
#sb-inner{padding:8px}
.sb-group{font-size:9px;font-weight:800;color:var(--muted-l);letter-spacing:1px;text-transform:uppercase;padding:10px 10px 4px;display:block}
.sb-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 10px;border-radius:10px;border:none;background:transparent;color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;text-align:right;transition:all var(--transition)}
.sb-btn:hover{background:var(--border-l);color:var(--navy)}
.sb-btn.active{background:var(--navy);color:#fff}
.sb-btn svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2}
.sb-div{height:1px;background:var(--border-l);margin:6px 8px}

/* ═══════════════════════════════════════════
   HEADER ELEMENTS
═══════════════════════════════════════════ */
.h-badge{background:var(--navy);color:#fff;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:800;white-space:nowrap}
.h-title{font-weight:800;color:var(--navy);font-size:14px;white-space:nowrap}
.h-actions{display:flex;gap:6px;align-items:center}
#menu-btn{display:none;background:var(--navy);border:none;color:#fff;border-radius:8px;padding:6px 8px;cursor:pointer;align-items:center;gap:4px}
#menu-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5}

/* ═══════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════ */
.btn{border:none;border-radius:var(--radius);font-family:'Cairo';font-weight:700;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;padding:8px 16px;transition:all var(--transition);white-space:nowrap;line-height:1.4}
.btn svg{width:14px;height:14px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2}
.btn:active{transform:scale(.97)}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy-l)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#15803d}
.btn-gold{background:var(--gold);color:#1a2e00}.btn-gold:hover{background:#b8953e}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#b91c1c}
.btn-ghost{background:var(--border-l);color:var(--navy)}.btn-ghost:hover{background:var(--border)}
.btn-outline{background:transparent;color:var(--navy);border:2px solid var(--navy)}.btn-outline:hover{background:var(--navy);color:#fff}
.btn-outline-red{background:transparent;color:var(--red);border:2px solid var(--red)}.btn-outline-red:hover{background:var(--red);color:#fff}
.btn-icon{background:transparent;border:none;cursor:pointer;border-radius:8px;padding:5px;display:inline-flex;align-items:center;justify-content:center;transition:all var(--transition)}
.btn-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2}
.btn-icon.edit{color:var(--blue)}.btn-icon.edit:hover{background:var(--blue-l)}
.btn-icon.del{color:var(--red)}.btn-icon.del:hover{background:var(--red-l)}
.btn-icon.view{color:var(--green)}.btn-icon.view:hover{background:var(--green-l)}

/* ═══════════════════════════════════════════
   FORMS & INPUTS
═══════════════════════════════════════════ */
.inp{width:100%;padding:9px 12px;border:2px solid var(--border);border-radius:var(--radius);font-family:'Cairo';font-size:13px;font-weight:600;outline:none;background:#f7f9fc;transition:border-color var(--transition),background var(--transition);color:var(--text)}
.inp:focus{border-color:var(--navy-xl);background:var(--surf)}
.inp.err{border-color:var(--red);background:#fff8f8}
.sel{width:100%;padding:9px 12px;border:2px solid var(--border);border-radius:var(--radius);font-family:'Cairo';font-size:13px;font-weight:600;background:#f7f9fc;outline:none;cursor:pointer;transition:border-color var(--transition);color:var(--text)}
.sel:focus{border-color:var(--navy-xl)}
.lbl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;display:block}
.field-wrap{display:flex;flex-direction:column}
.err-msg{color:var(--red);font-size:11px;margin-top:3px;font-weight:600;display:none}
.err-msg.show{display:block}
textarea.inp{resize:vertical;min-height:70px}

/* ═══════════════════════════════════════════
   CARDS
═══════════════════════════════════════════ */
.card{background:var(--surf);border-radius:var(--radius-lg);border:1px solid var(--border);box-shadow:var(--shadow)}
.card-hdr{padding:14px 16px;border-bottom:1px solid var(--border-l);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.card-body{padding:16px}
.section-title{font-size:15px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:8px}
.section-title::before{content:'';display:block;width:4px;height:20px;background:var(--gold);border-radius:4px;flex-shrink:0}

/* ═══════════════════════════════════════════
   TABLE
═══════════════════════════════════════════ */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl-wrap::-webkit-scrollbar{height:4px}.tbl-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
table.dt{width:100%;border-collapse:collapse;font-size:12px;min-width:680px}
table.dt thead th{background:var(--navy);color:#fff;padding:9px 8px;font-weight:700;font-size:11px;border:1px solid #163266;white-space:nowrap;position:sticky;top:0;z-index:2}
table.dt tbody tr{border-bottom:1px solid var(--border);transition:background var(--transition)}
table.dt tbody tr:nth-child(even){background:#f6f8fc}
table.dt tbody tr:hover{background:#eef3fd}
table.dt tbody td{padding:8px;border:1px solid var(--border);vertical-align:middle;color:var(--text)}
table.dt .td-center{text-align:center}
table.dt .td-mono{direction:ltr;font-family:monospace;font-size:11px;letter-spacing:.3px}

/* ═══════════════════════════════════════════
   BADGES
═══════════════════════════════════════════ */
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700}
.b-blue{background:var(--blue-l);color:var(--blue)}
.b-amber{background:var(--amber-l);color:#92400e}
.b-green{background:var(--green-l);color:#166534}
.b-purple{background:var(--purple-l);color:var(--purple)}
.b-navy{background:var(--border-l);color:var(--navy)}
.b-red{background:var(--red-l);color:var(--red)}

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal-box{background:var(--surf);border-radius:var(--radius-xl);width:100%;max-width:680px;box-shadow:var(--shadow-lg);margin:auto}
.modal-hdr{background:var(--navy);border-radius:var(--radius-xl) var(--radius-xl) 0 0;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.modal-hdr h2{color:#fff;font-weight:800;font-size:15px;margin:0}
.modal-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:background var(--transition)}
.modal-close:hover{background:rgba(255,255,255,.28)}
.modal-body{padding:20px;max-height:72vh;overflow-y:auto}
.modal-ftr{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;background:#f8fafc;border-radius:0 0 var(--radius-xl) var(--radius-xl);flex-wrap:wrap}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg .s2{grid-column:1/-1}
.grp-lbl{background:var(--navy);color:#fff;border-radius:8px;padding:4px 12px;font-size:11px;font-weight:700;display:inline-block;margin-bottom:10px}

/* ═══════════════════════════════════════════
   STATS
═══════════════════════════════════════════ */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-card{padding:16px;background:var(--surf);border-radius:var(--radius-lg);border:1px solid var(--border);border-right:4px solid;box-shadow:var(--shadow);transition:transform var(--transition)}
.stat-card:hover{transform:translateY(-2px)}
.stat-card .sc-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-card .sc-val{font-size:34px;font-weight:900;line-height:1}
.stat-card .sc-note{font-size:11px;color:var(--muted-l);margin-top:5px}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;padding:2px 0}
.bar-lbl{min-width:130px;font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.bar-track{flex:1;background:#f0f4f8;border-radius:6px;height:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.bar-val{min-width:32px;text-align:center;font-size:12px;font-weight:800}

/* ═══════════════════════════════════════════
   PERFORMANCE FORM
═══════════════════════════════════════════ */
.pf-table{width:100%;border-collapse:collapse;font-size:12px}
.pf-table th{background:var(--navy);color:#fff;padding:8px 6px;font-size:11px;border:1px solid #163266;text-align:center;white-space:nowrap}
.pf-table td{padding:7px 8px;border:1px solid var(--border);vertical-align:middle}
.pf-table .sec-row td{background:#eef2f7;font-weight:800;color:var(--navy);font-size:12px}
.pf-table .tot-row td{background:#f0f4f8;font-weight:800}
.score-inp{width:54px;text-align:center;border:1.5px solid var(--border);border-radius:7px;padding:4px;font-family:'Cairo';font-size:12px;font-weight:700;outline:none;background:#f7f9fc;transition:all var(--transition)}
.score-inp:focus{border-color:var(--navy-xl);background:var(--surf)}
.ar-txt{font-size:10px;color:var(--muted);min-width:58px;display:inline-block;text-align:center}

/* ═══════════════════════════════════════════
   AUTO-SAVE INDICATOR
═══════════════════════════════════════════ */
#as-toast{position:fixed;bottom:calc(var(--bottom-nav-h) + var(--safe-bottom) + 12px);right:12px;background:rgba(22,163,74,.93);color:#fff;padding:7px 16px;border-radius:10px;font-size:12px;font-weight:700;display:none;z-index:500;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:slideIn .3s ease}
.desktop-as{bottom:14px!important}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════════
   FLASH TOAST
═══════════════════════════════════════════ */
#flash{position:fixed;bottom:calc(var(--bottom-nav-h) + var(--safe-bottom) + 56px);left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 24px;border-radius:12px;font-weight:700;font-size:13px;box-shadow:var(--shadow-lg);z-index:600;display:none;animation:slideIn .3s ease;white-space:nowrap}
#flash.show{display:block}
.desktop-flash{bottom:56px!important}

/* ═══════════════════════════════════════════
   SEARCH BAR
═══════════════════════════════════════════ */
.search-bar{display:flex;align-items:center;gap:8px;background:#f7f9fc;border:2px solid var(--border);border-radius:var(--radius);padding:7px 12px;transition:border-color var(--transition)}
.search-bar:focus-within{border-color:var(--navy-xl);background:var(--surf)}
.search-bar svg{width:16px;height:16px;stroke:var(--muted-l);fill:none;stroke-width:2;flex-shrink:0}
.search-bar input{border:none;background:transparent;outline:none;font-family:'Cairo';font-size:13px;font-weight:600;color:var(--text);width:100%}
.search-bar input::placeholder{color:var(--muted-l)}

/* ═══════════════════════════════════════════
   MOBILE CARD LIST (instead of table on mobile)
═══════════════════════════════════════════ */
.emp-card-list{display:flex;flex-direction:column;gap:8px}
.emp-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:flex-start;gap:12px;transition:box-shadow var(--transition)}
.emp-card:active{box-shadow:var(--shadow)}
.emp-card-avatar{width:40px;height:40px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0}
.emp-card-info{flex:1;min-width:0}
.emp-card-name{font-weight:700;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emp-card-sub{font-size:12px;color:var(--muted);margin-top:2px}
.emp-card-actions{display:flex;gap:4px;flex-shrink:0}

/* ═══════════════════════════════════════════
   FAB (Float Action Button) - Mobile
═══════════════════════════════════════════ */
#fab{display:none;position:fixed;bottom:calc(var(--bottom-nav-h) + var(--safe-bottom) + 16px);left:16px;width:52px;height:52px;border-radius:50%;background:var(--navy);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(27,58,107,.4);z-index:36;align-items:center;justify-content:center;transition:all var(--transition)}
#fab:active{transform:scale(.92)}
#fab svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2.5}

/* ═══════════════════════════════════════════
   DROP MENU
═══════════════════════════════════════════ */
.drop-wrap{position:relative}
.drop-menu{position:absolute;top:calc(100% + 8px);right:0;background:var(--surf);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:8px;z-index:100;min-width:210px;display:none}
.drop-menu.open{display:block}
.drop-item{display:flex;align-items:center;gap:8px;width:100%;padding:8px 11px;border:none;background:transparent;cursor:pointer;border-radius:var(--radius);font-family:'Cairo';font-weight:600;font-size:12px;text-align:right;transition:background var(--transition);color:var(--text)}
.drop-item:hover,.drop-item:active{background:var(--border-l)}
.drop-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.drop-sep{height:1px;background:var(--border-l);margin:4px 0}

/* ═══════════════════════════════════════════
   UPLOAD SCREEN
═══════════════════════════════════════════ */
#upload-screen{min-height:100%;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#eef2f7,#dce7f5)}
.upload-card{background:var(--surf);border-radius:var(--radius-xl);padding:36px 32px;max-width:480px;width:100%;box-shadow:var(--shadow-lg);border:1px solid var(--border)}
.upload-icon{background:var(--navy);border-radius:16px;width:64px;height:64px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 6px 20px rgba(27,58,107,.3)}
.upload-icon svg{width:32px;height:32px;stroke:#fff;fill:none;stroke-width:1.5}
.drop-zone{display:block;border:3px dashed #c4cdd8;border-radius:var(--radius-lg);padding:28px;text-align:center;cursor:pointer;background:#f7f9fc;transition:all var(--transition)}
.drop-zone:hover,.drop-zone.drag{border-color:var(--navy-l);background:#eff6ff}
.drop-zone-icon{background:var(--navy);border-radius:11px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.drop-zone-icon svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2}

/* ═══════════════════════════════════════════
   PRINT HEADER/FOOTER
═══════════════════════════════════════════ */
.ph,.pf{display:none}

/* ═══════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════ */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#c4cdd8;border-radius:10px}
::-webkit-scrollbar-track{background:transparent}

/* ═══════════════════════════════════════════
   PRINT
═══════════════════════════════════════════ */
@media print{

<script>
// ═══════════════════════════════════════════════════════════
//  GLOBAL ERROR GUARD
// ═══════════════════════════════════════════════════════════
window.onerror = function(msg, src, line, col, err) {

  if (!m) return;
  m.style.cssText = 'padding:20px;max-width:none';
  m.innerHTML =

    String(msg).replace(/</g,'&lt;') + '<br>Line: ' + line + ':' + col + '</div>' +
    '<div style="font-size:13px;color:#64748b;line-height:2">' +

    '• جرب فتح الملف في Chrome أو Edge<br>' +
    '• إذا استمرت المشكلة، افتح أدوات المطور (F12) وأرسل الخطأ</div></div>';
};

function q(id){ try{ return document.getElementById(id); }catch(_){ return null; } }
function qv(id){ try{ return (q(id)||{}).value||''; }catch(_){ return ''; } }

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
var S={
  data:[], si:{governorate:'',district:'',schoolName:''},
  sg:{hrOfficer:'',principal:''},
  tab:'stats', selSub:'', selJob:'', retYear:2026,
  isLoaded:false, isMobile:false,
  gh:{enabled:false,owner:'',repo:'',token:'',path:'emis-data.json',sha:null,status:'idle',lastSync:null,error:''}
};

// ═══════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════
var uid=function(){return Date.now()+'_'+Math.random().toString(36).slice(2,8);};
var todayAr=function(){return new Date().toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'});};
var todayISO=function(){return new Date().toISOString().split('T')[0];};

function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function initials(name){
  if(!name) return '?';
  var parts=name.trim().split(' ');
  return parts.length>1?(parts[0][0]+parts[1][0]).toUpperCase():parts[0].slice(0,2);
}

var RATINGS=[
  {min:90,label:'كفء',color:'#16a34a'},
  {min:75,label:'فوق المتوسط',color:'#2563eb'},
  {min:60,label:'متوسط',color:'#f59e0b'},
  {min:50,label:'دون المتوسط',color:'#ea580c'},
  {min:0, label:'ضعيف',color:'#dc2626'},
];
function getRating(n){
  for(var i=0;i<RATINGS.length;i++) if(n>=RATINGS[i].min) return RATINGS[i];
  return RATINGS[RATINGS.length-1];
}

function b64encode(str){
  try{
    var bytes=new TextEncoder().encode(str);
    var binary='';
    for(var i=0;i<bytes.byteLength;i++) binary+=String.fromCharCode(bytes[i]);
    return btoa(binary);
  }catch(_){
    return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/gi,function(_,p1){
      return String.fromCharCode(parseInt(p1,16));
    }));
  }
}
function b64decode(b64){
  try{
    var binary=atob(b64.replace(/\n/g,''));
    var bytes=new Uint8Array(binary.length);
    for(var i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
    return new TextDecoder().decode(bytes);
  }catch(_){
    return decodeURIComponent(Array.prototype.map.call(atob(b64.replace(/\n/g,'')),function(c){
      return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
  }
}

var ONES_AR=['صفر','واحد','اثنان','ثلاثة','أربعة','خمسة','ستة','سبعة','ثمانية','تسعة','عشرة','أحد عشر','اثنا عشر','ثلاثة عشر','أربعة عشر','خمسة عشر','ستة عشر','سبعة عشر','ثمانية عشر','تسعة عشر','عشرون'];
var TENS_AR=['','عشرة','عشرون','ثلاثون','أربعون','خمسون','ستون','سبعون','ثمانون','تسعون'];
function numAr(n){
  n=parseInt(n)||0;
  if(n<=20) return ONES_AR[n];
  if(n<100){var t=Math.floor(n/10),o=n%10;return o?ONES_AR[o]+' و'+TENS_AR[t]:TENS_AR[t];}
  if(n===100) return 'مئة';
  return String(n);
}

// ═══════════════════════════════════════════════════════════
//  AUTO-SAVE
// ═══════════════════════════════════════════════════════════
function autoSave(silent){
  try{
    localStorage.setItem('emis_v7',JSON.stringify({
      data:S.data,si:S.si,sg:S.sg,ts:Date.now()
    }));
    var ghCfg={owner:S.gh.owner,repo:S.gh.repo,token:S.gh.token,path:S.gh.path,enabled:S.gh.enabled,sha:S.gh.sha};
    localStorage.setItem('emis_v7_gh',JSON.stringify(ghCfg));
  }catch(e){console.warn('LocalStorage save failed:',e);}

  if(!silent){
    var t=q('as-toast');
    if(t){t.style.display='block';clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none';},2200);}
  }

  if(S.gh.enabled&&S.gh.token&&S.gh.owner&&S.gh.repo){
    clearTimeout(autoSave._ghTimer);
    autoSave._ghTimer=setTimeout(function(){ghPush();},2000);
  }
}
autoSave._ghTimer=null;

// ═══════════════════════════════════════════════════════════
//  GITHUB API
// ═══════════════════════════════════════════════════════════
var GH_API='https://api.github.com';

function ghHeaders(){
  return{
    'Authorization':'Bearer '+S.gh.token,
    'Accept':'application/vnd.github+json',
    'X-GitHub-Api-Version':'2022-11-28',
    'Content-Type':'application/json'
  };
}

function ghSetStatus(st,err){
  S.gh.status=st;
  S.gh.error=err||'';
  if(st==='synced') S.gh.lastSync=new Date().toLocaleTimeString('ar-EG');
  updateSyncBadge();
}

function updateSyncBadge(){
  var el=q('gh-badge');
  if(!el) return;
  var icons={idle:'☁',syncing:'⟳',synced:'✓',error:'✗',offline:'⚠'};
  var colors={idle:'#64748b',syncing:'#f59e0b',synced:'#16a34a',error:'#dc2626',offline:'#f59e0b'};
  var labels={idle:'GitHub',syncing:'جاري الحفظ...',synced:'محفوظ '+S.gh.lastSync,error:'خطأ في المزامنة',offline:'بدون اتصال'};
  el.innerHTML=(icons[S.gh.status]||'☁')+' '+esc(labels[S.gh.status]||'GitHub');
  el.style.background=S.gh.status==='synced'?'#f0fdf4':S.gh.status==='error'?'#fef2f2':S.gh.status==='syncing'?'#fefce8':'#f8fafc';
  el.style.color=colors[S.gh.status]||'#64748b';
  el.style.borderColor=colors[S.gh.status]||'#e2e8f0';
  el.title=S.gh.error||'آخر مزامنة: '+(S.gh.lastSync||'لم تتم بعد');
  if(S.gh.status==='syncing') el.style.animation='spin 1s linear infinite';
  else el.style.animation='';
}

function ghPull(){
  if(!S.gh.enabled||!S.gh.token) return Promise.resolve(null);
  ghSetStatus('syncing');
  var url=GH_API+'/repos/'+S.gh.owner+'/'+S.gh.repo+'/contents/'+S.gh.path;
  return fetch(url,{headers:ghHeaders()})
    .then(function(r){
      if(r.status===404) return null;
      if(!r.ok) throw new Error('HTTP '+r.status+': '+r.statusText);
      return r.json();
    })
    .then(function(data){
      if(!data) return null;
      S.gh.sha=data.sha;
      var jsonStr=b64decode(data.content.replace(/\n/g,''));
      var parsed=JSON.parse(jsonStr);
      return parsed;
    })
    .catch(function(err){
      var msg=String(err);
      if(msg.indexOf('Failed to fetch')>=0||msg.indexOf('NetworkError')>=0){
        ghSetStatus('offline');
      } else {
        ghSetStatus('error',msg);
      }
      return null;
    });
}

function ghPush(){
  if(!S.gh.enabled||!S.gh.token||!S.gh.owner||!S.gh.repo) return;
  ghSetStatus('syncing');
  var payload={data:S.data,si:S.si,sg:S.sg,ts:Date.now(),version:'v7'};
  var jsonStr=JSON.stringify(payload,null,2);
  var b64=b64encode(jsonStr);
  var url=GH_API+'/repos/'+S.gh.owner+'/'+S.gh.repo+'/contents/'+S.gh.path;
  var body={message:'تحديث بيانات شئون العاملين — '+new Date().toLocaleString('ar-EG'),content:b64};
  if(S.gh.sha) body.sha=S.gh.sha;
  fetch(url,{method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)})
    .then(function(r){
      if(!r.ok) return r.json().then(function(j){throw new Error((j&&j.message)||('HTTP '+r.status));});
      return r.json();
    })
    .then(function(data){
      S.gh.sha=data.content.sha;
      try{var c=JSON.parse(localStorage.getItem('emis_v7_gh')||'{}');c.sha=S.gh.sha;localStorage.setItem('emis_v7_gh',JSON.stringify(c));}catch(_){}
      ghSetStatus('synced');
    })
    .catch(function(err){
      var msg=String(err);
      if(msg.indexOf('Failed to fetch')>=0||msg.indexOf('NetworkError')>=0){
        ghSetStatus('offline');
      } else if(msg.indexOf('409')>=0||msg.indexOf('conflict')>=0||msg.toLowerCase().indexOf('sha')>=0){
        ghSetStatus('syncing');
        fetch(GH_API+'/repos/'+S.gh.owner+'/'+S.gh.repo+'/contents/'+S.gh.path,{headers:ghHeaders()})
          .then(function(r){return r.json();})
          .then(function(d){S.gh.sha=d.sha;return ghPush();})
          .catch(function(e){ghSetStatus('error',String(e));});
      } else {
        ghSetStatus('error',msg);
      }
    });
}

function ghTestConnection(owner,repo,token){
  return fetch(GH_API+'/repos/'+owner+'/'+repo,{
    headers:{
      'Authorization':'Bearer '+token,
      'Accept':'application/vnd.github+json',
      'X-GitHub-Api-Version':'2022-11-28'
    }
  }).then(function(r){
    if(r.status===401) throw new Error('⚠ التوكن غير صالح أو منتهي الصلاحية');
    if(r.status===403) throw new Error('⚠ ليس لديك صلاحية الوصول لهذا الـ Repo');
    if(r.status===404) throw new Error('⚠ لم يتم إيجاد الـ Repo — تحقق من الاسم');
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(data){
    return {ok:true,private:data.private,name:data.full_name};
  });
}

// ═══════════════════════════════════════════════════════════
//  FLASH
// ═══════════════════════════════════════════════════════════
function flashMsg(msg,type){
  var el=q('flash');if(!el) return;
  el.textContent=msg;
  el.style.background=type==='err'?'#dc2626':'var(--navy)';
  el.className='show';
  clearTimeout(el._t);
  el._t=setTimeout(function(){el.className='';},2800);
}

// ═══════════════════════════════════════════════════════════
//  MOBILE DETECTION
// ═══════════════════════════════════════════════════════════
function checkMobile(){
  S.isMobile=window.innerWidth<=768;
  var at=q('as-toast'),fl=q('flash');
  if(at) at.className=S.isMobile?'':'desktop-as';
  if(fl){var c=fl.className.replace(/\s*desktop-flash/,'');fl.className=S.isMobile?c:c+' desktop-flash';}
}
window.addEventListener('resize',function(){
  try{checkMobile();if(S.isLoaded){renderSidebar();renderBottomNav();renderHeader();}}catch(_){}
});

// ═══════════════════════════════════════════════════════════
//  FILE HANDLING
// ═══════════════════════════════════════════════════════════
function cleanRows(raw){
  return raw.map(function(r){
    var o={};
    for(var k in r) o[k.trim()]=r[k]?String(r[k]).trim():'';
    if(!o._id) o._id=uid();
    return o;
  }).filter(function(r){return r['الاسم الكامل']&&r['الاسم الكامل']!=='الاسم الكامل';});
}

function parseHtmlTable(htmlText){
  var INVIS = /[\uFEFF\u200F\u200E\u200B\u200C\u200D\u202A\u202B\u202C\u202D\u202E]/g;
  var text = htmlText.replace(INVIS,'');
  var firstRowM = text.match(/<tr[^>]*>([\s\S]*?)<\/tr>/i);
  if(!firstRowM) return [];
  var firstRowHtml = firstRowM[1];
  var headers = [];
  var cellTag = /<th[^>]*>([\s\S]*?)<\/th>/gi;
  var m;
  while((m = cellTag.exec(firstRowHtml)) !== null){
    headers.push(m[1].replace(/<[^>]+>/g,'').trim());
  }
  if(!headers.length){
    cellTag = /<td[^>]*>([\s\S]*?)<\/td>/gi;
    while((m = cellTag.exec(firstRowHtml)) !== null){
      headers.push(m[1].replace(/<[^>]+>/g,'').trim());
    }
  }
  if(!headers.length) return [];
  var results = [];
  var trRe = /<tr[^>]*>([\s\S]*?)<\/tr>/gi;
  var isFirstRow = true;
  while((m = trRe.exec(text)) !== null){
    if(isFirstRow){ isFirstRow = false; continue; }
    var rowHtml = m[1];
    if(rowHtml.indexOf('<td') === -1 && rowHtml.indexOf('<TD') === -1) continue;
    var cells = [];
    var tdRe = /<td[^>]*>([\s\S]*?)<\/td>/gi;
    var td;
    while((td = tdRe.exec(rowHtml)) !== null){
      var val = td[1].replace(/<[^>]+>/g,'').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();
      cells.push(val);
    }
    if(!cells.length) continue;
    var obj = {};
    headers.forEach(function(h, i){
      obj[h] = i < cells.length ? cells[i] : '';
    });
    if(obj['الاسم الكامل'] && obj['الاسم الكامل'].trim()){
      results.push(obj);
    }
  }
  return results;
}

function handleFiles(files){
  var arr=Array.from(files),pend=arr.length;
  if(!pend) return;
  if(S.isLoaded){flashMsg('⏳ جاري تحميل '+pend+' ملف...');}
  var mainEl=document.getElementById('main');
  if(!S.isLoaded&&mainEl){
    mainEl.innerHTML='<div style="min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted)">'+
      '<div style="width:48px;height:48px;border:4px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin 1s linear infinite"></div>'+
      '<div style="font-weight:700;font-size:15px">جاري قراءة الملفات...</div></div>'+
      '<style>@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>';
  }
  arr.forEach(function(file){
    var ext=file.name.split('.').pop().toLowerCase();
    if(ext==='csv'){
      Papa.parse(file,{
        header:true,
        skipEmptyLines:true,
        encoding:'UTF-8',
        complete:function(r){
          S.data=S.data.concat(cleanRows(r.data));
          if(!--pend){S.isLoaded=true;autoSave(true);render();}
        },
        error:function(){
          if(!--pend) render();
        }
      });
    } else if(['xlsx','xls'].includes(ext)){
      var rdText=new FileReader();
      rdText.onload=function(e){
        var text=e.target.result||'';
        var preview=text.replace(/^\uFEFF/,'').trim().slice(0,500).toLowerCase();
        var isHtml=preview.indexOf('<html')>=0||preview.indexOf('<table')>=0||preview.indexOf('xmlns:')>=0;
        if(isHtml){
          try{
            var rows=parseHtmlTable(text);
            if(rows.length>0){
              S.data=S.data.concat(cleanRows(rows));
              flashMsg('✅ تم تحميل '+rows.length+' سجل من '+file.name);
              if(!--pend){S.isLoaded=true;autoSave(true);render();}
              return;
            }
          }catch(herr){console.warn(herr);}
        }
        var rdBin=new FileReader();
        rdBin.onload=function(e2){
          try{
            var wb=XLSX.read(e2.target.result,{type:'binary',codepage:65001});
            var ws=wb.Sheets[wb.SheetNames[0]];
            var parsed=cleanRows(XLSX.utils.sheet_to_json(ws,{defval:'',raw:false}));
            S.data=S.data.concat(parsed);
            if(parsed.length) flashMsg('✅ تم تحميل '+parsed.length+' سجل من '+file.name);
          }catch(err){
            console.error(err);
            flashMsg('⚠ تعذر قراءة الملف: '+file.name,'err');
          }
          if(!--pend){S.isLoaded=true;autoSave(true);render();}
        };
        rdBin.readAsBinaryString(file);
      };
      rdText.onerror=function(){
        if(!--pend) render();
      };
      rdText.readAsText(file,'UTF-8');
    } else {if(!--pend) render();}
  });
}

// ═══════════════════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════════════════
function getStats(){
  if(!S.data.length) return null;
  var m=0,f=0,jobs={},subs={},types={};
  S.data.forEach(function(r){
    var g=r['النوع']||'';
    if(g==='ذكر') m++;
    else if(g==='انثى'||g==='أنثى') f++;
    var j=r['الوظيفة']||'غير محدد';
    var s=r['مادة التدريس']||'إداري';
    var t=r['نوع العاملين']||'غير محدد';
    jobs[j]=(jobs[j]||0)+1;subs[s]=(subs[s]||0)+1;types[t]=(types[t]||0)+1;
  });
  var se=function(o){return Object.entries(o).sort(function(a,b){return b[1]-a[1];});};
  return{
    total:S.data.length,males:m,females:f,
    jobs:se(jobs),subjects:se(subs),types:se(types),
    uJobs:Object.keys(jobs).sort(),uSubs:Object.keys(subs).sort()

function buildXlsSheet(title,list,full){
  var si=S.si,sg=S.sg;
  var BH=['م','الاسم الكامل','الرقم القومي','تاريخ الميلاد','النوع','الوظيفة','مادة التدريس','المحمول'];
  var EH=full?['تاريخ التعيين','المؤهل','مرحلة التدريس','العنوان التفصيلي']:[];
  var AH=BH.concat(EH);
  var T=AH.length;
  var aoa=[];
  var r0=new Array(T).fill('');
  r0[0]='وزارة التربية والتعليم — جمهورية مصر العربية';
  r0[T-1]='التاريخ: '+todayAr();
  aoa.push(r0);
  var r1=new Array(T).fill('');
  r1[0]='محافظة: '+si.governorate;
  r1[Math.floor(T/2)-1]='الإدارة: '+si.district;
  r1[T-1]='المدرسة: '+si.schoolName;
  aoa.push(r1);
  aoa.push(new Array(T).fill(''));
  var r3=new Array(T).fill(''); r3[0]=title; aoa.push(r3);
  var r4=new Array(T).fill(''); r4[0]='إجمالي العدد: '+list.length+' عامل'; aoa.push(r4);
  aoa.push(new Array(T).fill(''));
  aoa.push(AH);
  list.forEach(function(e,i){
    var nid=String(e['الرقم القومي']||'');
    var row=[
      i+1, e['الاسم الكامل']||'',
      {t:'s',v:nid},
      e['تاريخ الميلاد']||'', e['النوع']||'',
      e['الوظيفة']||'', e['مادة التدريس']||'', e['المحمول']||''
    ];
    if(full) row=row.concat([e['تاريخ التعيين']||'',e['المؤهل']||'',e['مرحلة التدريس']||'',e['العنوان التفصيلي']||'']);
    aoa.push(row);
  });
  aoa.push(new Array(T).fill(''));
  aoa.push(new Array(T).fill(''));
  var sr1=new Array(T).fill(''); sr1[0]='وكيل شئون العاملين'; sr1[T-1]='مدير المدرسة'; aoa.push(sr1);
  var sr2=new Array(T).fill(''); sr2[0]=sg.hrOfficer||'.....................'; sr2[T-1]=sg.principal||'.....................'; aoa.push(sr2);
  var sr3=new Array(T).fill(''); sr3[0]='التوقيع: ..........................'; sr3[T-1]='التوقيع: ..........................'; aoa.push(sr3);
  var ws=XLSX.utils.aoa_to_sheet(aoa);
  applyRtlProps(ws);
  var baseW=[5,30,18,14,7,22,20,16];
  var extW=full?[14,26,14,32]:[];
  ws['!cols']=baseW.concat(extW).map(function(w){return{wch:w};});
  ws['!rows']=[{hpt:24},{hpt:22},{hpt:6},{hpt:30},{hpt:22},{hpt:6},{hpt:26}];
  for(var d=0;d<list.length;d++) ws['!rows'][7+d]={hpt:22};
  ws['!merges']=[
    {s:{r:0,c:0},e:{r:0,c:Math.floor(T/2)-1}},
    {s:{r:3,c:0},e:{r:3,c:T-1}},
    {s:{r:4,c:0},e:{r:4,c:T-1}},
  ];
  for(var c=0;c<T;c++){
    var ref0=XLSX.utils.encode_cell({r:0,c:c});
    var ref1=XLSX.utils.encode_cell({r:1,c:c});
    var ref3=XLSX.utils.encode_cell({r:3,c:c});
    var ref4=XLSX.utils.encode_cell({r:4,c:c});
    var ref6=XLSX.utils.encode_cell({r:6,c:c});
    if(!ws[ref0]) ws[ref0]={t:'s',v:''};ws[ref0].s=SS.ministryS;
    if(!ws[ref1]) ws[ref1]={t:'s',v:''};ws[ref1].s=SS.infoS;
    if(!ws[ref3]) ws[ref3]={t:'s',v:''};ws[ref3].s=SS.titleS;
    if(!ws[ref4]) ws[ref4]={t:'s',v:''};ws[ref4].s=SS.countS;
    if(!ws[ref6]) ws[ref6]={t:'s',v:''};ws[ref6].s=SS.hdr;
  }
  for(var ri=0;ri<list.length;ri++){
    var even=ri%2===1;
    for(var ci=0;ci<T;ci++){
      var cellRef=XLSX.utils.encode_cell({r:7+ri,c:ci});
      if(!ws[cellRef]) ws[cellRef]={t:'s',v:''};
      if(ci===2){ws[cellRef].s=even?SS.nidSE:SS.nidS;ws[cellRef].t='s';}
      else if(ci===1){ws[cellRef].s=even?SS.rowNameE:SS.rowName;}
      else{ws[cellRef].s=even?SS.rowE:SS.rowO;}
    }
  }
  var sigBaseR=7+list.length+2;
  for(var sr=sigBaseR;sr<sigBaseR+3;sr++){
    for(var sc=0;sc<T;sc++){
      var sRef=XLSX.utils.encode_cell({r:sr,c:sc});
      if(!ws[sRef]) ws[sRef]={t:'s',v:''};ws[sRef].s=SS.sigS;
    }
  }
  return ws;
}

    aoa.push(cols);
    grp.forEach(function(e,i){
      var nid=String(e['الرقم القومي']||'');
      aoa.push([i+1,e['الاسم الكامل']||'',{t:'s',v:nid},e['تاريخ الميلاد']||'',e['النوع']||'',e['الوظيفة']||'',e['مادة التدريس']||'',yr]);
    });
    aoa.push(new Array(T).fill(''));
  }
  aoa.push(new Array(T).fill(''));
  [['وكيل شئون العاملين','مدير المدرسة'],
   [sg.hrOfficer||'.......................',sg.principal||'.......................'],
   ['التوقيع: ......................','التوقيع: ......................']
  ].forEach(function(p){var r=new Array(T).fill('');r[0]=p[0];r[T-1]=p[1];aoa.push(r);});
  var ws=XLSX.utils.aoa_to_sheet(aoa);
  applyRtlProps(ws);
  ws['!cols']=[{wch:5},{wch:30},{wch:18},{wch:14},{wch:7},{wch:22},{wch:20},{wch:10}];
  ws['!merges']=[{s:{r:3,c:0},e:{r:3,c:T-1}}];
  return ws;
}

function shName(n,used){
  var s=n.replace(/[\\\/?*\[\]:]/g,'').slice(0,31);
  if(used.has(s)){var i=2;while(used.has(s.slice(0,28)+i))i++;s=s.slice(0,28)+i;}
  used.add(s);return s;
}

function exportFull(){
  var stats=getStats();if(!stats){flashMsg('لا توجد بيانات للتصدير','err');return;}
  var wb=XLSX.utils.book_new(),u=new Set();
  XLSX.utils.book_append_sheet(wb,buildStatsSheet(stats),shName('إحصاء عام',u));
  XLSX.utils.book_append_sheet(wb,buildXlsSheet('كشف كل العاملين',S.data,true),shName('كل العاملين',u));
  stats.uSubs.forEach(function(s){
    var d=S.data.filter(function(r){return (r['مادة التدريس']||'إداري')===s;});
    if(d.length) XLSX.utils.book_append_sheet(wb,buildXlsSheet('مادة: '+s,d,false),shName('م.'+s,u));
  });
  stats.uJobs.forEach(function(j){
    var d=S.data.filter(function(r){return (r['الوظيفة']||'غير محدد')===j;});
    if(d.length) XLSX.utils.book_append_sheet(wb,buildXlsSheet('وظيفة: '+j,d,false),shName('و.'+j,u));
  });
  XLSX.utils.book_append_sheet(wb,buildRetSheet(),shName('المحالون للمعاش',u));
  XLSX.writeFile(wb,'تقرير_شامل_'+(S.si.schoolName||'المدرسة').replace(/\s+/g,'_')+'.xlsx');
}

function exportSingle(title,list,full){
  if(!list||!list.length){flashMsg('لا توجد بيانات','err');return;}
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,buildXlsSheet(title,list,full),'الكشف');
  XLSX.writeFile(wb,title.replace(/[\/\\:*?"<>|]/g,'_')+'.xlsx');
}

function saveHtmlFile(){
  var payload=JSON.stringify({data:S.data,si:S.si,sg:S.sg});
  var html=document.documentElement.outerHTML;
  var OPEN_TAG  = 'saved-data" type="application/json">';
  var CLOSE_TAG = '</' + 'script>';
  var re = new RegExp('(id="' + OPEN_TAG + ')([\\s\\S]*?)(' + CLOSE_TAG + ')');
  html = html.replace(re, function(m,a,b,c){ return a + payload + c; });
  var blob=new Blob([html],{type:'text/html;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='منظومة_شئون_العاملين_محفوظة.html';
  a.click();URL.revokeObjectURL(a.href);
  flashMsg('✅ تم حفظ الملف مع البيانات بنجاح!');
}

function ghSaveSettings(){
  var owner=qv('gh_owner').trim();
  var repo=qv('gh_repo').trim();
  var token=qv('gh_token').trim();
  var path=qv('gh_path').trim()||'emis-data.json';
  var enabled=q('gh_enabled').checked;
  var res=q('gh-test-result');
  var btn=q('gh-save-btn');
  if(!owner||!repo||!token){
    if(res){res.innerHTML='<div style="color:var(--red);font-size:12px;padding:8px 0">⚠ يرجى ملء جميع الحقول المطلوبة</div>';}
    return;
  }
  if(res) res.innerHTML='<div style="color:var(--amber);font-size:12px;padding:8px 0">⏳ جاري اختبار الاتصال...</div>';
  if(btn) btn.disabled=true;
  ghTestConnection(owner,repo,token)
    .then(function(info){
      S.gh.owner=owner;S.gh.repo=repo;S.gh.token=token;S.gh.path=path;S.gh.enabled=enabled;
      if(res) res.innerHTML='<div style="color:var(--green);font-size:12px;padding:8px 0">✅ تم الاتصال بنجاح بـ <strong>'+esc(info.name)+'</strong>'+(info.private?' (Private ✓)':'')+'</div>';
      autoSave(true);
      setTimeout(function(){
        closeModal();
        renderHeader();
        if(enabled) ghPush();
        flashMsg('✅ تم ربط GitHub بنجاح — سيتم حفظ البيانات تلقائياً');
      },1200);
    })
    .catch(function(err){
      if(res) res.innerHTML='<div style="color:var(--red);font-size:12px;padding:8px 0">'+esc(String(err))+'</div>';
      if(btn) btn.disabled=false;
    });
}

var _srchT={};
function onSearch(inputId,tabKey,full){
  clearTimeout(_srchT[tabKey]);
  _srchT[tabKey]=setTimeout(function(){
    var q2=((q(inputId)||{}).value||'').toLowerCase().trim();
    var list=getTabData(tabKey);
    var filt=q2?list.filter(function(e){
      return (e['الاسم الكامل']||'').toLowerCase().includes(q2)||
             (e['الرقم القومي']||'').includes(q2)||
             (e['الوظيفة']||'').toLowerCase().includes(q2)||
             (e['مادة التدريس']||'').toLowerCase().includes(q2);
    }):list;
    var tbody=q('tbl_'+tabKey),cnt=q('cnt_'+tabKey),cards=q('cards_'+tabKey);
    if(tbody) tbody.innerHTML=buildRows(filt,full);
    if(cards) cards.innerHTML=buildCards(filt);
    if(cnt) cnt.textContent=filt.length+(q2?' (من '+list.length+')':'');
  },220);
}

function getTabData(key){
  if(key==='manage'||key==='full') return S.data;
  if(key==='subjects') return S.data.filter(function(r){return (r['مادة التدريس']||'إداري')===S.selSub;});
  if(key==='jobs') return S.data.filter(function(r){return (r['الوظيفة']||'غير محدد')===S.selJob;});
  if(key==='retirees') return S.data.filter(function(r){return r['تاريخ الميلاد']&&parseInt(r['تاريخ الميلاد'].split('-')[0])===(S.retYear-60);});
  return S.data;
}

  if(!list.length){
    return'<tr><td colspan="'+(full?12:9)+'" style="padding:40px;text-align:center;color:var(--muted-l);font-size:13px">لا توجد بيانات</td></tr>';
  }

    var gb=e['النوع']==='ذكر'?'b-blue':'b-amber';

    return'<tr>'+
      '<td class="td-center" style="color:var(--muted);font-weight:700">'+(i+1)+'</td>'+
      '<td style="font-weight:700;color:var(--text)">'+esc(e['الاسم الكامل'])+'</td>'+

      '<td style="color:var(--blue);font-weight:600">'+esc(e['الوظيفة']||'—')+'</td>'+

var PF_CRITERIA=[
  {sec:'أولاً: إدارة الأعمال',items:[
    {k:'q',l:'كمية العمل',max:15},
    {k:'iq',l:'درجة إتقان العمل',max:15}

    {k:'p',l:'مشاركته في تحسين ومستوى أداء العمل بالمدرسة',max:20},

    {k:'ld',l:'القدرة على القيادة والتوجيه',max:10},
    {k:'ce',l:'الشهادات والدرجات العلمية والدورات التدريبية',max:10}
  ]},

  ]}
];
var PF_EVALS=['r1','r2','r3'];
var PF_EVAL_NAMES=['الرئيس المباشر','المدير المحلي','الرئيس الأعلى'];
var PF_ALL_KEYS=PF_CRITERIA.reduce(function(a,s){return a.concat(s.items.map(function(i){return i.k;}));},[]);
function pfCalc(){
  PF_EVALS.forEach(function(ek){
    var tot=0;
    PF_ALL_KEYS.forEach(function(k){
      var el=q('pf_'+ek+'_'+k);
      if(!el) return;
      var v=Math.min(Math.max(parseInt(el.value)||0,0),parseInt(el.max)||100);
      tot+=v;
      var ar=q('pf_'+ek+'_'+k+'_ar');
      if(ar) ar.textContent=v>0?numAr(v):'';
    });
    var te=q('pf_tot_'+ek),re=q('pf_rat_'+ek);
    if(te) te.textContent=tot||'—';
    if(re){var rt=getRating(tot);re.textContent=tot>0?rt.label:'—';re.style.color=tot>0?rt.color:'var(--muted)';}
  });
}

function printPerfForm(){
  var v=function(id){return esc(qv(id));};
  var si=S.si;

    scores[ek]={};var tot=0;
    PF_ALL_KEYS.forEach(function(k){var val=parseInt((q('pf_'+ek+'_'+k)||{}).value)||0;scores[ek][k]=val;tot+=val;});
    scores[ek].total=tot;scores[ek].rating=tot>0?getRating(tot):{label:'',color:'#333'};
  });
  var pRows='';
  PF_CRITERIA.forEach(function(sec){
    pRows+='<tr><td colspan="'+(2+PF_EVALS.length*2)+'" style="background:#eef2f7;font-weight:800;color:#1b3a6b;padding:6px 10px">'+sec.sec+'</td></tr>';

        pRows+='<td style="text-align:center;font-weight:700">'+(scores[ek][item.k]||'')+'</td>';
        pRows+='<td style="text-align:center;font-size:10px;color:#555">'+(scores[ek][item.k]?numAr(scores[ek][item.k]):'')+'</td>';
      });
      pRows+='</tr>';
    });
  });
  pRows+='<tr style="background:#eef2f7;font-weight:800"><td colspan="2" style="padding:6px 8px">المجموع</td>';
  PF_EVALS.forEach(function(ek){pRows+='<td colspan="2" style="text-align:center;font-size:13px;font-weight:900;color:#1b3a6b">'+(scores[ek].total||'—')+'</td>';});
  pRows+='</tr><tr><td colspan="2" style="padding:5px 8px">مرتبة التقدير</td>';
  PF_EVALS.forEach(function(ek){pRows+='<td colspan="2" style="text-align:center;font-weight:700;color:'+scores[ek].rating.color+'">'+scores[ek].rating.label+'</td>';});
  pRows+='</tr>';

      '<svg viewBox="0 0 24 24"><path d="'+item.d+'"/></svg>'+

  }).join('');

function toggleDropMenu(){var m=q('exp-menu');if(m) m.classList.toggle('open');}
function closeDropMenu(){var m=q('exp-menu');if(m) m.classList.remove('open');}

// ═══════════════════════════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════════════════════════
function setTab(k){
  S.tab=k;
  if(S.isMobile&&q('sidebar').classList.contains('open')) toggleSidebar();
  renderSidebar();renderBottomNav();renderMain();
}
function renderMain(){
  var m=q('main');if(!m) return;
  var stats=getStats(),tab=S.tab;
  if(tab==='stats'){m.innerHTML=renderStats();return;}
  if(tab==='manage'){m.innerHTML=renderTableSection('إدارة بيانات العاملين',S.data,'manage',true,'كشف كل العاملين');return;}
  if(tab==='full'){m.innerHTML=renderTableSection('كشف كامل البيانات',S.data,'full',true,'كشف كامل البيانات');return;}
  if(tab==='perf_form'){m.innerHTML=renderPerfForm();return;}
  if(tab==='leave_form'){m.innerHTML=renderLeaveForm();return;}
  if(tab==='subjects'){
    var h='<div class="card" style="padding:14px;margin-bottom:14px"><label class="lbl">اختر المادة / التخصص</label><select class="sel" onchange="S.selSub=this.value;renderMain()"><option value="">— اختر —</option>';
    if(stats) stats.uSubs.forEach(function(sv){h+='<option value="'+esc(sv)+'"'+(S.selSub===sv?' selected':'')+'>'+esc(sv)+'</option>';});
    h+='</select></div>';m.innerHTML=h;
    if(S.selSub) m.innerHTML+=renderTableSection('كشف مادة: '+S.selSub,getTabData('subjects'),'subjects',false,'كشف مادة '+S.selSub);
    return;
  }
  if(tab==='jobs'){
    var h='<div class="card" style="padding:14px;margin-bottom:14px"><label class="lbl">اختر الوظيفة</label><select class="sel" onchange="S.selJob=this.value;renderMain()"><option value="">— اختر —</option>';
    if(stats) stats.uJobs.forEach(function(j){h+='<option value="'+esc(j)+'"'+(S.selJob===j?' selected':'')+'>'+esc(j)+'</option>';});
    h+='</select></div>';m.innerHTML=h;
    if(S.selJob) m.innerHTML+=renderTableSection('كشف وظيفة: '+S.selJob,getTabData('jobs'),'jobs',false,'كشف وظيفة '+S.selJob);
    return;
  }
  if(tab==='retirees'){
    var h='<div class="card" style="padding:18px;margin-bottom:14px;background:linear-gradient(135deg,#fffbeb,#fef9c3);border-color:#fde68a">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">'+
      '<div><h3 style="font-weight:800;color:var(--navy);font-size:14px;margin-bottom:4px">استعلام المحالين للمعاش</h3><p style="color:var(--muted);font-size:12px">سن المعاش: 60 سنة</p></div>'+
      '<div style="display:flex;align-items:center;gap:12px;background:#fff;padding:10px 16px;border-radius:var(--radius-lg);border:1px solid var(--border)">'+
      '<div style="text-align:center"><div style="font-size:26px;font-weight:900;color:var(--navy);line-height:1">'+S.retYear+'</div><div style="font-size:10px;color:var(--muted)">مواليد '+(S.retYear-60)+'</div></div>'+
      '<input type="range" min="2024" max="2045" value="'+S.retYear+'" oninput="S.retYear=parseInt(this.value);renderMain()" style="appearance:none;width:130px;height:6px;background:#e2e8f0;border-radius:10px;outline:none;cursor:pointer">'+
      '</div></div></div>';
    m.innerHTML=h+renderTableSection('المحالون للمعاش '+S.retYear+' — مواليد '+(S.retYear-60),getTabData('retirees'),'retirees',false);
    return;
  }
}
function render(){
  try{
    checkMobile();
    if(!S.isLoaded){
      var hdr=q('header'),sb=q('sidebar'),bn=q('bottom-nav'),ib=q('info-bar'),mb=q('menu-btn'),fb=q('fab');
      if(hdr) hdr.style.display='none';
      if(sb)  sb.style.display='none';
      if(bn)  bn.style.display='none';
      if(ib)  ib.style.display='none';
      if(mb)  mb.style.display='none';
      if(fb)  fb.style.display='none';
      var ms=q('main-scroll'); if(ms) ms.style.overflow='auto';
      var m=q('main');
      if(m){m.style.padding='0';m.style.maxWidth='none';m.innerHTML=renderUpload();}
      return;
    }
    var hdr2=q('header'),sb2=q('sidebar'),mb2=q('menu-btn'),ms2=q('main-scroll'),m2=q('main');
    if(hdr2) hdr2.style.display='flex';
    if(sb2)  sb2.style.display='block';
    if(mb2)  mb2.style.display='flex';
    if(ms2)  ms2.style.overflow='auto';
    if(m2){m2.style.padding='16px';m2.style.maxWidth='1200px';}
    var bn2=q('bottom-nav'),fb2=q('fab');
    if(S.isMobile){if(bn2) bn2.style.display='flex';if(fb2) fb2.style.display='flex';}
    else{if(bn2) bn2.style.display='none';if(fb2) fb2.style.display='none';}
    renderSidebar();
    renderBottomNav();
    renderHeader();
    renderMain();
  }catch(fatal){
    console.error(fatal);
  }
}

(function init(){
  try{
    var ghCfg=JSON.parse(localStorage.getItem('emis_v7_gh')||'{}');
    if(ghCfg&&ghCfg.token){
      S.gh.owner=ghCfg.owner||'';S.gh.repo=ghCfg.repo||'';
      S.gh.token=ghCfg.token||'';S.gh.path=ghCfg.path||'emis-data.json';
      S.gh.enabled=!!ghCfg.enabled;S.gh.sha=ghCfg.sha||null;
    }
  }catch(_){}
  try{
    var ls=localStorage.getItem('emis_v7');
    if(ls){var p=JSON.parse(ls);if(p&&p.data&&p.data.length>0){S.data=p.data;S.si=p.si||S.si;S.sg=p.sg||S.sg;S.isLoaded=true;}}
  }catch(_){}
  try{
    var el=q('saved-data');
    var raw=el?el.textContent:'';
    raw=(raw||'').trim();
    if(raw&&raw!=='null'&&raw.length>5){
      var p2=JSON.parse(raw);
      if(p2&&p2.data&&p2.data.length>0){
        S.data=p2.data;
        S.si=p2.si||p2.schoolInfo||S.si;
        S.sg=p2.sg||p2.signatures||S.sg;
        S.isLoaded=true;
      }
    }
  }catch(_){}
  try{checkMobile();}catch(_){}
  try{render();}catch(e){
    document.body.innerHTML='<div style="padding:30px;font-family:Arial;direction:rtl;background:#fff;min-height:100vh">'+
      '<h2 style="color:#dc2626">⚠ خطأ في تهيئة التطبيق</h2>'+
      '<p style="margin:10px 0;color:#475569">'+String(e).replace(/</g,'&lt;')+'</p>'+
      '<p style="color:#64748b">حاول تحديث الصفحة أو فتح الملف في Chrome/Edge</p></div>';
  }
  if(S.gh.enabled&&S.gh.token&&S.gh.owner&&S.gh.repo){
    try{ghSetStatus('syncing');updateSyncBadge();}catch(_){}
    ghPull().then(function(d){
      if(!d){try{ghSetStatus('synced');updateSyncBadge();}catch(_){}return;}
      try{
        var localTs=0;
        try{var ls2=JSON.parse(localStorage.getItem('emis_v7')||'{}');localTs=ls2.ts||0;}catch(_){}
        if((d.ts||0)>localTs&&d.data&&d.data.length>0){
          S.data=d.data;if(d.si) S.si=d.si;if(d.sg) S.sg=d.sg;
          S.isLoaded=true;autoSave(true);
          flashMsg('☁ تم تحميل '+d.data.length+' سجل من GitHub');
          render();
        } else {ghSetStatus('synced');}
        updateSyncBadge();
      }catch(e2){console.warn(e2);}
    }).catch(function(){try{updateSyncBadge();}catch(_){}});
  }
})();
